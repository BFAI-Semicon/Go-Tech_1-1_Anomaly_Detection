name: Deploy

on:
  workflow_run:
    workflows: ["Build & Push Images", "Build & Push Worker"]
    types: [completed]
  workflow_dispatch:

# Persistent data directory (outside $GITHUB_WORKSPACE)
env:
  SHARED_DATA_DIR: /var/lib/leadersboard/shared

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: [self-hosted, Linux, X64, prod]
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - name: Ensure shared data directory exists
        run: |
          set -euo pipefail
          sudo mkdir -p "${SHARED_DATA_DIR}"
          # Extract only APP_UID/APP_GID without sourcing the entire file
          # (sourcing prod.env would override SHARED_DATA_DIR)
          APP_UID=$(grep -m1 '^APP_UID=' /etc/leadersboard/prod.env | cut -d= -f2)
          APP_GID=$(grep -m1 '^APP_GID=' /etc/leadersboard/prod.env | cut -d= -f2)
          sudo chown -R "${APP_UID}:${APP_GID}" "${SHARED_DATA_DIR}"

      - name: Verify htpasswd exists
        run: |
          set -euo pipefail
          test -f /etc/leadersboard/nginx/auth/htpasswd || {
            echo "ERROR: htpasswd not found at /etc/leadersboard/nginx/auth/htpasswd"
            exit 1
          }

      - name: Prepare .env for compose
        run: |
          set -euo pipefail
          test -f /etc/leadersboard/prod.env
          mkdir -p LeadersBoard
          # Remove SHARED_DATA_DIR/NGINX_AUTH_DIR from prod.env to avoid
          # duplicate keys (docker compose uses the first occurrence)
          grep -vE '^(SHARED_DATA_DIR|NGINX_AUTH_DIR)=' /etc/leadersboard/prod.env \
            > LeadersBoard/.env
          echo "SHARED_DATA_DIR=${SHARED_DATA_DIR}" >> LeadersBoard/.env
          echo "NGINX_AUTH_DIR=/etc/leadersboard/nginx/auth" >> LeadersBoard/.env
          chmod 600 LeadersBoard/.env

      - name: Deploy (pull & up)
        run: |
          set -euo pipefail
          cd LeadersBoard
          ls -la
          docker compose -f docker-compose.yml -f docker-compose.prod.yml pull
          docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-build

      - name: Show status
        if: always()
        run: |
          set -euo pipefail
          cd LeadersBoard
          docker compose -f docker-compose.yml -f docker-compose.prod.yml ps
